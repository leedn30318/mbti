<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그 시절, 우리의 여름 학교: 나의 MBTI 찾기</title>
    <style>
        /* 깔끔하고 키치한 감성의 Do Hyeon 폰트 및 Noto Sans 조합 */
        @import url('https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Noto+Sans+KR:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            /* 주황색이 아닌, 햇살이 맑게 쏟아지는 에메랄드빛 한낮의 바다 컬러 그라데이션 */
            background: linear-gradient(-135deg, #e0f7fa, #80deea, #4fc3f7, #81d4fa);
            background-size: 200% 200%;
            animation: daylightGlow 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: #264653;
            padding: 20px;
        }

        @keyframes daylightGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 은은하게 빛나는 맑은 날의 윤슬/반짝이 레이어 */
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* 맑고 투명한 유리 느낌의 글래스모피즘 카드 */
        .card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            padding: 40px 25px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(38, 70, 83, 0.1), 
                        0 0 30px rgba(255, 255, 255, 0.5) inset;
            z-index: 1;
            display: none;
            animation: smoothFade 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .card.active {
            display: block;
        }

        @keyframes smoothFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 키치하고 선명한 타이틀 스타일 */
        h1 {
            font-family: 'Do Hyeon', sans-serif;
            font-size: 2.8rem;
            color: #0077b6;
            text-shadow: 2px 2px 0px #caf0f8, 4px 4px 0px rgba(0, 119, 182, 0.15);
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #0096c7;
            margin: 0 0 30px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* CSS로 구현한 감성 여름 일러스트 구역 */
        .illust-container {
            width: 130px;
            height: 130px;
            margin: 20px auto 30px auto;
            position: relative;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 3px solid #fff;
        }

        /* 1. 메인 돛배 일러스트 */
        .illust-sea {
            width: 70px;
            height: 70px;
            background: linear-gradient(to bottom, #4ea8de, #48cae4);
            clip-path: polygon(50% 0%, 100% 70%, 100% 100%, 0% 100%, 0% 70%);
            border-radius: 0 0 15px 15px;
            position: relative;
            animation: floatIllust 3s infinite ease-in-out;
        }
        .illust-sea::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px;
            width: 0; height: 0;
            border-left: 25px solid transparent;
            border-bottom: 40px solid #fff;
        }

        /* 2. 질문창 파도 일러스트 */
        .illust-wave {
            width: 80px;
            height: 40px;
            background: #90e0ef;
            border-radius: 50% 50% 0 0;
            position: relative;
            animation: floatIllust 2.5s infinite ease-in-out;
        }
        .illust-wave::after {
            content: '';
            position: absolute;
            width: 60px; height: 30px;
            background: #00b4d8;
            border-radius: 50% 50% 0 0;
            bottom: 0; left: 10px;
        }

        /* 3. 결과창 아이스크림 일러스트 */
        .illust-ice {
            width: 45px;
            height: 75px;
            background: linear-gradient(to bottom, #ffb703, #fb8500);
            border-radius: 20px 20px 5px 5px;
            position: relative;
            animation: floatIllust 3.5s infinite ease-in-out;
        }
        .illust-ice::after {
            content: '';
            position: absolute;
            bottom: -20px; left: 17px;
            width: 10px; height: 25px;
            background: #dda15e;
            border-radius: 0 0 5px 5px;
        }

        @keyframes floatIllust {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(3deg); }
        }

        /* 키치하고 시원한 버튼 스타일 */
        .btn {
            background: #ffffff;
            border: 2.5px solid #0077b6;
            border-radius: 20px;
            color: #0077b6;
            padding: 16px 20px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 14px;
            word-break: keep-all;
            box-shadow: 0 4px 0px #0077b6;
            position: relative;
            top: 0;
        }

        .btn:hover {
            top: 2px;
            box-shadow: 0 2px 0px #0077b6;
            background: #caf0f8;
        }

        .btn:active {
            top: 4px;
            box-shadow: 0 0px 0px #0077b6;
        }

        /* 진행도 바 (밀키 화이트 & 블루) */
        .progress-bar {
            width: 100%;
            height: 14px;
            background-color: rgba(255,255,255,0.5);
            border-radius: 20px;
            margin-bottom: 35px;
            overflow: hidden;
            border: 2px solid #0077b6;
        }

        .progress-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00b4d8, #0077b6);
            transition: width 0.3s ease;
        }

        /* 본문 질문 텍스트 */
        .question-text {
            font-family: 'Do Hyeon', sans-serif;
            font-size: 1.6rem;
            color: #005f73;
            margin-bottom: 40px;
            word-break: keep-all;
            line-height: 1.4;
            min-height: 50px;
            letter-spacing: 0.5px;
        }

        /* 결과 페이지 셋팅 */
        .mbti-badge {
            display: inline-block;
            background: #0077b6;
            color: #ffffff;
            padding: 6px 24px;
            border-radius: 16px;
            font-family: 'Do Hyeon', sans-serif;
            font-size: 2.3rem;
            margin: 10px 0;
            box-shadow: 4px 4px 0px #caf0f8;
            letter-spacing: 1px;
        }

        .result-title {
            font-family: 'Do Hyeon', sans-serif;
            font-size: 1.9rem;
            color: #d62828;
            margin: 15px 0 5px 0;
            word-break: keep-all;
        }
        
        .result-desc {
            color: #264653;
            background: rgba(255, 255, 255, 0.6);
            border: 2px dashed #0077b6;
            padding: 22px;
            border-radius: 20px;
            text-align: left;
            line-height: 1.6;
            margin: 25px 0;
            font-size: 0.98rem;
            word-break: keep-all;
        }

        .restart-btn {
            background: #ffb703 !important;
            border-color: #fb8500 !important;
            color: #fb8500 !important;
            box-shadow: 0 4px 0px #fb8500 !important;
        }
        .restart-btn:hover { background: #ffe3a8 !important; }
    </style>
</head>
<body>

    <div class="sparkles" id="sparkles"></div>

    <div class="card active" id="start-card">
        <h1>우리의 여름 학교</h1>
        <p class="subtitle">☀️ 맑고 눈부신 날, 나는 어떤 학생일까? 🌊</p>
        <div class="illust-container">
            <div class="illust-sea"></div>
        </div>
        <button class="btn" onclick="startTest()">테스트 시작하기</button>
    </div>

    <div class="card" id="question-card">
        <div class="progress-bar">
            <div class="progress-inner" id="progress"></div>
        </div>
        <div class="question-text" id="question">질문 로딩중...</div>
        <button class="btn" id="ansA" onclick="selectAnswer('A')">선택지 A</button>
        <button class="btn" id="ansB" onclick="selectAnswer('B')">선택지 B</button>
        <div class="illust-container" style="width:90px; height:90px; margin: 25px auto 0 auto;">
            <div class="illust-wave"></div>
        </div>
    </div>

    <div class="card" id="result-card">
        <h1>나의 여름 학교 유형은?</h1>
        <div class="mbti-badge" id="result-mbti">MBTI</div>
        <div class="result-title" id="result-name">결과 유형 이름</div>
        <div class="illust-container" style="width:100px; height:100px; margin: 15px auto;">
            <div class="illust-ice"></div>
        </div>
        <div class="result-desc" id="result-desc">결과 세부 설명</div>
        <button class="btn restart-btn" onclick="restartTest()">다시 테스트하기 🔄</button>
    </div>

    <script>
        const questions = [
            { q: "드디어 기다리던 여름방학 시작! 나의 계획은?", type: "EI", a: "방학인데 집에만 있을 수 없지! 친구들과 바다 여행 약속 잡기", b: "에어컨 시원하게 틀고 침대 위에서 밀린 영상 정주행하기" },
            { q: "등굣길에 짝꿍이 '나 오늘 더위 먹은 것 같아...' 라고 한다면?", type: "TF", a: "헐 많이 더워? 양산 쓰고 다녀야겠다. 보건실 같이 가줄까?", b: "몇 도인데 그래? 물 많이 마시고 타이레놀 먹어봐" },
            { q: "새 학기 첫날, 교실 문을 열고 들어섰을 때 나의 행동은?", type: "EI", a: "마음에 드는 자리 근처 친구에게 먼저 '안녕!' 말을 건넨다", b: "조용히 눈에 안 띄는 뒷자리 구석에 가서 앉아 폰을 본다" },
            { q: "여름 축제 부스를 기획할 때 나는 어떤 아이디어를 낼까?", type: "SN", a: "작년에 인기 많았던 아이스 슬러시나 물풍선 던지기 부스 하자!", b: "우주 콘셉트의 암흑 카페나 타임슬립 귀신의 집 어때?" },
            { q: "기말고사가 일주일 남았을 때 나의 공부 상태는?", type: "JP", a: "일별, 과목별로 꼼꼼하게 짜둔 플래너대로 실천하는 중", b: "시험은 원래 벼락치기지! 전날의 초사이언 집중력을 믿는다" },
            { q: "체육대회 이어달리기 주자로 뽑혔다. 이때 내 머릿속은?", type: "SN", a: "바통 놓치지 말고 앞사람만 따라 열심히 뛰어야지!", b: "내가 뛰다가 넘어져서 바통이 날아가 관중석을 맞추면 어떡하지?" },
            { q: "수행평가 조장을 맡게 되었다. 조원들을 이끄는 나의 방식은?", type: "JP", a: "역할 분담과 마감 기한을 확실히 정해두고 체계적으로 독려한다", b: "그때그때 생각나는 좋은 아이디어를 반영하며 자유롭게 진행한다" },
            { q: "친구가 '나 이번 시험 열심히 준비했는데 망쳤어...'라며 울먹인다", type: "TF", a: "많이 속상하겠다... 노력한 거 내가 다 아는데 속상해 ㅠㅠ", b: "몇 점 나왔는데? 어느 파트에서 많이 틀렸어?" },
            { q: "미술 시간에 '나만의 여름 바다'를 그리라고 한다면?", type: "SN", a: "내가 가봤던 해수욕장의 백사장과 파라솔을 사실적으로 묘사한다", b: "심해 속 전설의 고래와 유령선이 함께 있는 판타지 바다를 그린다" },
            { q: "쉬는 시간, 매점에 아이스크림을 사러 갈 때 나는?", type: "EI", a: "교실 뒤편에서 '매점 갈 사람!!' 외치며 우르르 몰려간다", b: "친한 친구 한 명과 조용히 다녀오거나 혼자 슥 갔다 온다" },
            { q: "내일은 신나는 현장체험학습(소풍) 가는 날!", type: "JP", a: "가방에 넣을 소지품 리스트를 체크하고 옷도 미리 코디해 둔다", b: "내일 아침에 일어나서 날씨 보고 대충 손에 잡히는 대로 챙긴다" },
            { q: "선생님이 갑자기 '오늘 수업 일찍 끝났으니 자유시간!' 이라고 하실 때", type: "TF", a: "와 대박! 쌤 진짜 최고예요! (폭풍 리액션)", b: "오 개꿀 (자연스럽게 자거나 자습할 준비를 한다)" }
        ];

        const results = {
            "ENFJ": { name: "교내 최고 인기쟁이 학생회장", desc: "청량한 여름 햇살처럼 주변을 밝히는 존재! 다정다감하고 리더십이 뛰어나 선후배 모두에게 인기가 많아요." },
            "ENFP": { name: "축제 기획의 달인, 인간 포카리스웨트", desc: "통통 튀는 아이디어와 지치지 않는 에너지를 가졌어요! 축제 시즌만 되면 세상에서 가장 행복해지는 분위기 메이커." },
            "ENTJ": { name: "전교 1등 포스, 야망 넘치는 반장", desc: "체계적이고 단호한 카리스마의 소유자! 조별 과제나 수행평가할 때 하드캐리하며 조원들을 승리로 이끕니다." },
            "ENTP": { name: "선생님도 못 말리는 재치 만점 만담꾼", desc: "두뇌 회전이 빠르고 말재주가 좋아요. 수업 시간에 엉뚱하지만 날카로운 질문으로 교실을 웃음바다로 만듭니다." },
            "INFJ": { name: "비 오는 날 창밖을 보는 감성 문예부장", desc: "생각이 깊고 어른스러운 타입. 친구들의 고민을 진심으로 들어주며, 보이지 않는 곳에서 묵묵히 챙겨주는 따뜻한 사람입니다." },
            "INFP": { name: "이어폰 끼고 만화 그리는 몽상가", desc: "나만의 감성 세계가 뚜렷한 예술가 타입. 조용하지만 내면에는 한여름의 푸른 바다보다 넓은 상상력을 품고 있어요." },
            "INTJ": { name: "도서부 속 베일에 싸인 천재 전교 탑", desc: "비효율적인 것을 싫어하는 똑순이/똑돌이. 혼자 조용히 공부하는 것 같지만 시험 점수는 항상 최상위권을 유지하는 책사형." },
            "INTP": { name: "하루 종일 잠만 자는 천재 과학부원", desc: "쉬는 시간에도, 수업 시간에도 졸려 보이지만 관심 있는 분야의 이야기가 나오면 눈이 반짝이며 천재성을 발휘합니다." },
            "ESFJ": { name: "반 친구들 생일 다 챙기는 매점 요정", desc: "공감 능력이 뛰어나고 주변 사람 챙기기가 취미인 다정한 친구! 매점 갈 때 항상 친구들을 데리고 다니는 인싸입니다." },
            "ESFP": { name: "체육대회 응원단장, 댄스부 에이스", desc: "흥이 넘치고 리액션이 최고인 학교의 아이돌! 이 친구가 없는 학교생활은 팥 없는 팥빙수와 같습니다." },
            "ESTJ": { name: "칼같이 규칙 지키는 선도부장", desc: "시간 약속과 규칙을 철저히 지키는 모범생. 한여름 땡볕 아래서도 흐트러짐 없는 단정한 모습을 보여줍니다." },
            "ESTP": { name: "방과 후 운동장을 지배하는 체육부장", desc: "운동 신경이 좋고 겁이 없는 골목대장 타입! 매사 자신감이 넘치고 시원시원한 성격으로 친구들을 이끕니다." },
            "ISFJ": { name: "학급의 천사, 보건실 지킴이", desc: "조용하고 성실하며 남을 배려하는 마음이 깊어요. 친구가 아프거나 도움이 필요할 때 가장 먼저 손을 내미는 든든한 조력자." },
            "ISFP": { name: "하굣길 꿀잠을 사랑하는 평화주의자", desc: "갈등을 싫어하고 다수 의견에 잘 맞춰주는 착한 친구. 주말이나 방학에는 침대 밖으로 절대 안 나오는 집순이/집돌이 속성 완비." },
            "ISTJ": { name: "노트 필기의 정석, 인간 교과서", desc: "오차 없는 계획과 정돈된 필기 노트를 가진 학생. 무뚝뚝해 보이지만 맡은 일은 끝까지 책임지는 가장 신뢰할 수 있는 친구입니다." },
            "ISTP": { name: "자전거 타고 등교하는 쿨 가이/쿨 걸", desc: "말수가 적고 시크하지만 손재주가 좋아 고장 난 기계를 뚝딱 고쳐내는 맥가이버 학생. 은근히 츤데레 매력이 있습니다." }
        };

        let currentIdx = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        function startTest() {
            document.getElementById('start-card').classList.remove('active');
            document.getElementById('question-card').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            if (currentIdx >= questions.length) {
                showResult();
                return;
            }
            const percent = (currentIdx / questions.length) * 100;
            document.getElementById('progress').style.width = percent + '%';

            const currentQ = questions[currentIdx];
            document.getElementById('question').innerText = `Q${currentIdx + 1}. ${currentQ.q}`;
            document.getElementById('ansA').innerText = currentQ.a;
            document.getElementById('ansB').innerText = currentQ.b;
        }

        function selectAnswer(choice) {
            const currentQ = questions[currentIdx];
            const type = currentQ.type;

            if (choice === 'A') {
                scores[type[0]]++;
            } else {
                scores[type[1]]++;
            }

            currentIdx++;
            showQuestion();
        }

        function showResult() {
            document.getElementById('question-card').classList.remove('active');
            document.getElementById('result-card').classList.add('active');

            let mbti = "";
            mbti += (scores.E >= scores.I) ? "E" : "I";
            mbti += (scores.S >= scores.N) ? "S" : "N";
            mbti += (scores.T >= scores.F) ? "T" : "F";
            mbti += (scores.J >= scores.P) ? "J" : "P";

            const resultData = results[mbti];

            document.getElementById('result-mbti').innerText = mbti;
            document.getElementById('result-name').innerText = resultData.name;
            document.getElementById('result-desc').innerText = resultData.desc;
        }

        function restartTest() {
            currentIdx = 0;
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            document.getElementById('progress').style.width = '0%';
            document.getElementById('result-card').classList.remove('active');
            document.getElementById('start-card').classList.add('active');
        }

        // 개수는 많지만(60개) 눈부시지 않고 투명하게 반짝이는 낮의 윤슬 이펙트
        function createSparkles() {
            const container = document.getElementById('sparkles');
            const sparkleCount = 60;
            container.innerHTML = ''; 
            for(let i=0; i<sparkleCount; i++) {
                const sparkle = document.createElement('div');
                sparkle.style.position = 'absolute';
                // 투명도를 대폭 높여 은은하게(rgba 0.2 ~ 0.5) 설정
                sparkle.style.background = `rgba(255, 255, 255, ${Math.random() * 0.3 + 0.2})`;
                sparkle.style.borderRadius = '50%';
                
                const size = Math.random() * 5 + 2;
                sparkle.style.width = size + 'px';
                sparkle.style.height = size + 'px';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.left = Math.random() * 100 + '%';
                
                sparkle.style.animation = `twinkle ${Math.random() * 4 + 3}s infinite ease-in-out`;
                sparkle.style.boxShadow = '0 0 4px rgba(255, 255, 255, 0.6)';
                container.appendChild(sparkle);
            }
        }

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes twinkle {
                0%, 100% { opacity: 0.3; transform: scale(0.9); }
                50% { opacity: 1; transform: scale(1.2); }
            }
        `;
        document.head.appendChild(style);

        window.onload = createSparkles;
    </script>
</body>
</html>
