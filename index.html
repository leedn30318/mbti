<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그 시절, 우리의 여름 학교: 나의 MBTI 찾기</title>
    <style>
        /* 깔끔하고 키치한 감성의 Do Hyeon 폰트 및 Noto Sans 조합 */
        @import url('https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Noto+Sans+KR:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            /* 주황색이 아닌, 햇살이 맑게 쏟아지는 에메랄드빛 한낮의 바다 컬러 그라데이션 */
            background: linear-gradient(-135deg, #e0f7fa, #80deea, #4fc3f7, #81d4fa);
            background-size: 200% 200%;
            animation: daylightGlow 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: #264653;
            padding: 20px;
        }

        @keyframes daylightGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 은은하게 빛나는 맑은 날의 윤슬/반짝이 레이어 */
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* 맑고 투명한 유리 느낌의 글래스모피즘 카드 */
        .card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            padding: 40px 25px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(38, 70, 83, 0.1), 
                        0 0 30px rgba(255, 255, 255, 0.5) inset;
            z-index: 1;
            display: none;
            animation: smoothFade 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .card.active {
            display: block;
        }

        @keyframes smoothFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 키치하고 선명한 타이틀 스타일 */
        h1 {
            font-family: 'Do Hyeon', sans-serif;
            font-size: 2.8rem;
            color: #0077b6;
            text-shadow: 2px 2px 0px #caf0f8, 4px 4px 0px rgba(0, 119, 182, 0.15);
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #0096c7;
            margin: 0 0 30px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* CSS로 구현한 감성 여름 일러스트 구역 */
        .illust-container {
            width: 130px;
            height: 130px;
            margin: 20px auto 30px auto;
            position: relative;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 3px solid #fff;
        }

        /* 1. 메인 돛배 일러스트 */
        .illust-sea {
            width: 70px;
            height: 70px;
            background: linear-gradient(to bottom, #4ea8de, #48cae4);
            clip-path: polygon(50% 0%, 100% 70%, 100% 100%, 0% 100%, 0% 70%);
            border-radius: 0 0 15px 15px;
            position: relative;
            animation: floatIllust 3s infinite ease-in-out;
        }
        .illust-sea::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px;
            width: 0; height: 0;
            border-left: 25px solid transparent;
            border-bottom: 40px solid #fff;
        }

        /* 2. 질문창 파도 일러스트 */
        .illust-wave {
            width: 80px;
            height: 40px;
            background: #90e0ef;
            border-radius: 50% 50% 0 0;
            position: relative;
            animation: floatIllust 2.5s infinite ease-in-out;
        }
        .illust-wave::after {
            content: '';
            position: absolute;
            width: 60px; height: 30px;
            background: #00b4d8;
            border-radius: 50% 50% 0 0;
            bottom: 0; left: 10px;
        }

        /* 3. 결과창 아이스크림 일러스트 */
        .illust-ice {
            width: 45px;
            height: 75px;
            background: linear-gradient(to bottom, #ffb703, #fb8500);
            border-radius: 20px 20px 5px 5px;
            position: relative;
            animation: floatIllust 3.5s infinite ease-in-out;
        }
        .illust-ice::after {
            content: '';
            position: absolute;
            bottom: -20px; left: 17px;
            width: 10px; height: 25px;
            background: #dda15e;
            border-radius: 0 0 5px 5px;
        }

        @keyframes floatIllust {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(3deg); }
